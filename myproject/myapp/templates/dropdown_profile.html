<img id="bigProfilePicture" src="{{ profile_pic }}" width="350" height="350" class="rounded-circle" onerror="this.onerror=null; this.src='/media/profile_pics/default.jpg';">

<form id="profile-form">
	<input type="file" id="profile-picture" name="profile_picture" accept="image/*" required>
	<button type="submit">Upload</button>
	<p id="uploadError"></p>
</form>
