{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>ft_transcendence</title>
	<!-- Bootstrap CSS -->
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
	<!-- Custom CSS -->
	<link rel="stylesheet" href="{% static 'css/style.css' %}">
	<!-- Add favicon.ico -->
	<link rel="icon" href="{% static 'favicon.ico' %}" type="image/x-icon">
</head>

<body>

	<!-- Background GIF -->
	<div class="backgroundGIF-container" >
		<img src="{% static 'videos/pong.gif' %}" alt="backgroundGIF">
	</div>
	
	<!-- Landing Page (title and login button) -->
	<div class="landing-page">
		<div id="title-container">
			<div id="title-text">ft_transcendence</div>
		</div>
		
		<div class="button-container">
			<button class="btn btn-gradient btn-custom mt-4" id="loginButton" data-bs-toggle="modal" data-bs-target="#loginModal">Login</button>
		</div>
	</div>

	<!-- Login Modal -->
	<div class="modal top fade" id="loginModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true" data-bs-backdrop="static" data-bs-keyboard="false">
		<div class="modal-dialog modal-dialog-centered">
			<div class="modal-content neon-border">
				<div class="modal-body">

					<!-- Tabs for switching between Login and Register -->
					<ul class="nav nav-tabs w-100" id="myTab" role="tablist">
						<li class="nav-item flex-fill" role="presentation">
							<a class="nav-link inactive-tab active text-center" id="login-tab" data-bs-toggle="tab" href="#login" role="tab" aria-controls="login" aria-selected="true">Login</a>
						</li>
						<li class="nav-item flex-fill" role="presentation">
							<a class="nav-link inactive-tab text-center" id="register-tab" data-bs-toggle="tab" href="#register" role="tab" aria-controls="register" aria-selected="false">Register</a>
						</li>
					</ul>
					<div class="tab-content mt-3" id="myTabContent">

						<!-- Login Form -->
						<div class="tab-pane fade show active" id="login" role="tabpanel" aria-labelledby="login-tab">
							<form id="loginForm">
								<div class="form-group modalText mt-3">
									<label for="inputLoginUsername">Username</label>
									<input type="text" class="form-control" id="inputLoginUsername" placeholder="Enter Username">
								</div>
								<div class="form-group modalText mt-2">
									<label for="inputLoginPassword">Password</label>
									<input type="password" class="form-control" id="inputLoginPassword" placeholder="Password">
								</div>
								<div class="form-group modalText mt-3" id="totpContainer">
									<label for="inputLogin2FA">2FA Code</label>
									<div class="form-group d-flex justify-content-center">
										<input type="text" class="form-control code-input" maxlength="1" required>
										<input type="text" class="form-control code-input" maxlength="1" required>
										<input type="text" class="form-control code-input" maxlength="1" required>
										<input type="text" class="form-control code-input" maxlength="1" required>
										<input type="text" class="form-control code-input" maxlength="1" required>
										<input type="text" class="form-control code-input" maxlength="1" required>
									</div>
								</div>
								<div class="d-flex justify-content-between align-items-center mt-3">
									<p class="mb-0" id="loginError"></p>
									<button type="submit" class="btn btn-primary mt-3">Login</button>
								</div>
							</form>
						</div>

						<!-- Register Form -->
						<div class="tab-pane fade" id="register" role="tabpanel" aria-labelledby="register-tab">
							<form id="registerForm">
								<div class="form-group modalText mt-2">
									<label>Username</label>
									<input type="text" class="form-control" id="inputRegisterUsername" name="username" placeholder="Enter Username" required>
								</div>
								<div class="form-group modalText mt-2">
									<label>Password</label>
									<input type="password" class="form-control" id="inputRegisterPassword" name="password" placeholder="Password" required>
								</div>
								<div class="form-group modalText mt-2">
									<label>Confirm Password</label>
									<input type="password" class="form-control" id="inputRegisterConfirmPassword" name="confirmPassword" placeholder="Confirm Password" required>
								</div>
								<div class="form-check modalText mt-3" id="checkboxContainer">
									<label class="form-check-label" for="inputRegisterCheckbox">Check this box if you want to enable 2FA</label>
									<input type="checkbox" class="form-check-input" id="inputRegisterCheckbox">
								</div>
								<div class="form-group modalText mt-2">
									<p id="qrCodeText"></p>
								</div>
								<div id="qrCodeContainer" class="mb-4"></div>
								<div class="d-flex justify-content-between align-items-center mt-3">
									<p class="mb-0" id="registerError"></p>
									<button type="submit" class="btn btn-primary">Register</button>
								</div>
							</form>
						</div>

						</div>
					</div>
				</div>
			</div>
		</div>
	</div>

	<!-- Bootstrap JS and Popper.js -->
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
	<!-- CryptoJS for password hashing-->
	<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
	<!-- Custom JS -->
	<script src="{% static 'js/script.js' %}"></script>
	
</body>
</html>
