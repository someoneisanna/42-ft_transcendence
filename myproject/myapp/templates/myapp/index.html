{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>ft_transcendence</title>
	<!-- Bootstrap CSS -->
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
	<!-- Custom CSS -->
	<link rel="stylesheet" href="{% static 'myapp/css/style.css' %}">
	<!-- Add favicon.ico -->
	<link rel="icon" href="{% static 'myapp/favicon.ico' %}" type="image/x-icon">
</head>

<body>

	<!-- Background GIF -->
	<div class="backgroundGIF-container" >
		<img src="{% static 'myapp/videos/pong.gif' %}" alt="backgroundGIF">
	</div>
	
	<!-- Landing Page (title and login button) -->
	<div class="landing-page">
		<div id="title-container">
			<div id="title-text">ft_transcendence</div>
		</div>
		
		<div class="button-container">
			<button class="btn btn-gradient btn-custom mt-4" id="loginButton" data-bs-toggle="modal" onclick="navigateTo('login_modal')">Login</button>
		</div>
	</div>

	<div id="content">
		{% block content %}{% endblock %}
	</div>

	<!-- Bootstrap JS and Popper.js -->
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
	<!-- CryptoJS for password hashing-->
	<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
	<!-- Custom JS -->
	<script src="{% static 'myapp/js/script.js' %}"></script>
	
</body>
</html>
