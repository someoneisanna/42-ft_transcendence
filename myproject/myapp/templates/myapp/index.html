{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>ft_transcendence</title>
	<!-- Bootstrap CSS -->
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
	<!-- Custom CSS -->
	<link rel="stylesheet" href="{% static 'myapp/css/style.css' %}">
</head>

<body>

	<div class="backgroundVideo-container" >
		<video autoplay muted loop id="backgroundVideo">
			<source src="{% static 'myapp/videos/pongvideo.mp4' %}" type="video/mp4">
			Your browser does not support the video tag.
		</video>
	</div>
	
	<div class="landing-page">
		<div id="title-container">
			<div id="title-text">ft_transcendence</div>
		</div>
		
		<div class="button-container">
			<button class="btn btn-gradient btn-custom mt-4" id="myButton" data-bs-toggle="modal" data-bs-target="#loginModal">Login</button>
		</div>
	</div>

    <div class="modal top fade" id="loginModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true" data-mdb-backdrop="static" data-mdb-keyboard="false">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content neon-border"> <!-- Add neon-border class here -->
                <div class="modal-header">
                    <h5 class="modal-title text-white" id="exampleModalLabel">Login</h5>
                    <button type="button" class="btn-close" data-mdb-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <!-- Add your login buttons here -->
                    <button class="btn btn-light">Login with Google</button>
                    <button class="btn btn-light">Login with Facebook</button>
                    <!-- You can add more buttons as needed -->
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-mdb-dismiss="modal">
                        Close
                    </button>
                </div>
            </div>
        </div>
    </div>    
	
	<!-- Bootstrap JS and Popper.js -->
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
	<!-- Custom JS -->
	<script src="{% static 'myapp/js/script.js' %}"></script>
	
</body>
</html>
