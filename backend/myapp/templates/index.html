{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>ft_transcendence</title>
	<!-- Font Awesome -->
	{% comment %} <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"> {% endcomment %}
	<script src="https://kit.fontawesome.com/28069d7203.js" crossorigin="anonymous"></script>
	<!-- Bootstrap CSS -->
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
	
	<!-- Custom CSS -->
	<link rel="stylesheet" href="{% static 'css/index.css' %}">
	<link rel="stylesheet" href="{% static 'css/landing_page.css' %}">
	<link rel="stylesheet" href="{% static 'css/layout.css' %}">
	<link rel="stylesheet" href="{% static 'css/game_choice.css' %}">
	<link rel="stylesheet" href="{% static 'css/dropdown_profile.css' %}">
	<link rel="stylesheet" href="{% static 'css/dropdown_friends.css' %}">
	<link rel="stylesheet" href="{% static 'css/dropdown_settings.css' %}">
	<link rel="stylesheet" href="{% static 'css/pong/pong_menu.css' %}">
	<link rel="stylesheet" href="{% static 'css/pong/pong_game.css' %}">
	
	<!-- Add favicon.ico -->
	<link rel="icon" href="{% static 'favicon.ico' %}" type="image/x-icon">
</head>

<body>

	<input type="hidden" name="csrfmiddlewaretoken" value="{{ csrf_token }}">

	<div id="layout"></div>
	<div id="content"></div>
	
	<!-- Collapsible button -->
	<div id="chat" class="hiddenChat">
		<button id="chatButton" onclick="toggleChatWindow()">Chat<i class="fas fa-chevron-up"></i></button>
		<div class="chatContent showFriendsOnly">
			<div id="chatHeader"></div>
			<div id="chatFriendsList">
				<h5>Friends</h5>
				<div class="input-group rounded mb-3">
					<input type="search" class="form-control rounded" placeholder="Search" aria-label="Search" aria-describedby="search-addon"></input>
					<span class="input-group-text border-0" id="search-addon">
						<i class="fas fa-search"></i>
					</span>
				</div>
				<div class="scrollableFriends">
					<div data-mdb-perfect-scrollbar-init style="position: relative; height: 350px">
						<ul id="chatFriendsListContent" class="list-unstyled mb-0">
						</ul>
					</div>
				</div>
			</div>
			<div id="chatWindow" class="chatWindow noChatClicked">
				<div class="card-header d-flex justify-content-between align-items-center p-2">
					<h5 class="mb-0">Chat</h5>
					<div id="chatUpperCornerButtons">
						<button type="button" data-mdb-button-init data-mdb-ripple-init class="btn btn-primary btn-sm" data-mdb-ripple-color="dark">Go to Profile</button>
						<button type="button" class="blockButtonClass btn btn-sm btn-outline-danger"> <i class="fa fa-ban"></i></button>
					</div>
				</div>
				<div class="scrollableTexts">
					<div id="textsContainer" class="pt-2" data-mdb-perfect-scrollbar-init style="position: relative; height: 360px">
					</div>
				</div>
				<div class="text-muted d-flex justify-content-start align-items-center pt-3">
					<input type="text" class="form-control form-control-md" id="sendMessageInput" placeholder="Type message"></input>
					<a class="ms-3 text-muted" href="#!"><i class="fas fa-smile"></i></a>
					<a class="sendMessageButton ms-3" href="#"><i class="fas fa-paper-plane"></i></a>
				</div>
			</div>
		</div>
	</div>
	
	<!-- Cookie Consent Modal -->
	<div id="cookieconsent" class="modal fade" tabindex="-1" aria-labelledby="cookieconsentLabel" aria-hidden="true" data-bs-backdrop="static" data-bs-keyboard="false">
		<div class="modal-dialog">
			<div class="modal-content">
				<div class="modal-header text-white">
					<h5 class="modal-title" id="cookieconsentLabel">Cookies & Privacy</h5>
				</div>
				<div class="modal-body">
					<div class="row">
						<div class="col-3 d-flex align-items-center justify-content-center">
							<i class="fas fa-cookie-bite fa-4x text-primary"></i>
						</div>
						<div class="col-9">
							<p>This website uses cookies to ensure you get the best experience on our website.</p>
						</div>
					</div>
				</div>
				<div class="modal-footer">
					<button id="acceptCookiesButton" type="button" class="btn btn-primary" data-bs-dismiss="modal">Accept</button>
				</div>
			</div>
		</div>
	</div>

	<!-- Bootstrap JS and Popper.js -->
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
	<!-- CryptoJS for password hashing-->
	<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
	
	<!-- Custom JS -->
	<script src="{% static 'js/index.js' %}"></script>
	<script src="{% static 'js/csrf.js' %}"></script>
	<script src="{% static 'js/routing.js' %}"></script>
	<script src="{% static 'js/landing_page.js' %}"></script>
	<script src="{% static 'js/layout.js' %}"></script>
	<script src="{% static 'js/dropdown_profile.js' %}"></script>
	<script src="{% static 'js/dropdown_friends.js' %}"></script>
	<script src="{% static 'js/dropdown_settings.js' %}"></script>
	<script src="{% static 'js/pong/pong_init.js' %}"></script>
	<script src="{% static 'js/pong/pong_quickplay.js' %}"></script>

</body>
</html>
